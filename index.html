<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    >
    <title>Web Carom Prototype</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <div class="hud top">
        <div class="brand">
          <strong>4구 웹 프로토타입</strong>
          <span id="statusText">각도와 회전을 조절한 뒤 샷</span>
        </div>
        <button id="resetButton" class="hud-button">재시작</button>
      </div>

      <div class="hud center">
        <div class="crosshair"></div>
      </div>

      <div class="floating-actions">
        <button id="controlsToggle" class="hud-button compact">조작</button>
        <button id="viewToggle" class="hud-button compact">CUE</button>
        <button id="zoomOutButton" class="hud-button compact" aria-label="줌 아웃">−</button>
        <button id="zoomInButton" class="hud-button compact" aria-label="줌 인">+</button>
        <button id="shootButton" class="shoot-fab">샷</button>
      </div>

      <div id="controlsDrawer" class="controls-drawer" data-open="false">
        <div class="controls-handle">
          <span>터치 조작</span>
          <span class="handle-hint">위로 올리기 / 내리기</span>
        </div>
        <div class="controls-grid">
          <div class="panel left">
            <div class="panel-title">시점 / 조준</div>
            <div id="aimPad" class="touch-pad">
              <div class="touch-label">드래그해서 시점 이동</div>
              <div id="aimThumb" class="thumb"></div>
            </div>
          </div>

          <div class="panel middle">
            <div class="panel-title">타점</div>
            <div id="spinPad" class="spin-pad">
              <div class="spin-ring"></div>
              <div id="spinThumb" class="spin-thumb"></div>
            </div>
            <div class="spin-readout">
              <span>X <strong id="spinXValue">0.00</strong></span>
              <span>Y <strong id="spinYValue">0.00</strong></span>
            </div>
          </div>

          <div class="panel right">
            <div class="panel-title">세기</div>
            <div class="power-wrap">
              <input id="powerSlider" class="power-slider" type="range" min="0.12" max="1" step="0.01" value="0.45">
              <div class="power-readout">
                세기 <strong id="powerValue">45%</strong>
              </div>
            </div>
            <div class="drawer-tip">오른쪽 드래그로도 세기 조절 가능</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
